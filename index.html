  <div id="image-lightbox" class="lightbox">
    <div class="lightbox-container">
      <span class="close-lightbox">✕</span>
      <div class="lightbox-body">
        <div class="lightbox-img-side"><img id="full-img"></div>
        <div class="lightbox-info-side"><h3 id="img-title"></h3><p id="img-description"></p></div>
      </div>
    </div>
  </div>

  <script>
    const lightbox = document.getElementById('image-lightbox');
    const fullImg = document.getElementById('full-img');
    const titleText = document.getElementById('img-title');
    const descText = document.getElementById('img-description');

    document.querySelectorAll('.portfolio-item img').forEach(img => {
      img.addEventListener('click', () => {
        fullImg.src = img.src;
        titleText.textContent = img.dataset.title;
        descText.textContent = img.dataset.description;
        lightbox.style.display = 'flex';
      });
    });

    lightbox.addEventListener('click', e => {
      if(e.target === lightbox || e.target.className === 'close-lightbox') {
        lightbox.style.display = 'none';
      }
    });
  </script>
