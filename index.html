<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Lemon-e | Portfolio</title>
  <link rel="icon" href="smile.png" type="image/png">
  <style>
    @font-face {
      font-family: 'PixelArabic';
      src: url('fonts/ar-pixel.ttf') format('truetype');
    }

    @keyframes bg-scrolling {
      0% { background-position: 0 0; }
      100% { background-position: 250px 250px; }
    }

    @keyframes titleFloatAndRotate {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-15px) rotate(3deg); }
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes scroll-infinite {
      0% { transform: translateX(0); }
      100% { transform: translateX(50%); } 
    }

    img {
      -webkit-user-drag: none;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      margin: 0; padding: 0;
      background: url('https://img.itch.zone/aW1nLzI0NzQ2NzM3LnBuZw==/original/dzRs3r.png');
      background-repeat: repeat; 
      background-size: 250px; 
      background-attachment: fixed;
      animation: bg-scrolling 10s linear infinite;
      font-family: 'PixelArabic', sans-serif;
      direction: rtl; 
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header-section { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding-top: 150px; 
      padding-bottom: 50px;
      z-index: 10;
    }

    h1 {
      font-size: 3.5em; color: white; margin: 10px 0;
      text-shadow: 5px 5px 0px #000;
      animation: titleFloatAndRotate 3s ease-in-out infinite;
    }

    .desc { color: white; text-align: center; margin-bottom: 25px; line-height: 1.6; }

    .social-links { display: flex; gap: 15px; } 
    .social-btn {
      cursor: pointer; height: 60px; width: 60px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 16px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 3px solid #fff; animation: titleFloat 4s ease-in-out infinite;
      text-decoration: none; box-sizing: border-box;
    }

    #discord { background-color: #6367E9; }
    #github  { background-color: #16181B; }
    #itch    { background-color: #DD6660; }
    #email   { background-color: #808080; }

    .social-btn:hover { width: 180px; transform: scale(1.1); justify-content: flex-start; padding: 0 15px; }
    .social-btn span { width: 0; opacity: 0; overflow: hidden; transition: 0.4s; font-weight: bold; color: white; white-space: nowrap; }
    .social-btn:hover span { width: auto; opacity: 1; margin-right: 10px; }
    .social-btn svg, .social-btn img { height: 32px; width: 32px; flex-shrink: 0; }

    .top-ground-divider {
      width: 100vw; 
      height: 400px;
      background-image: url('top-ground.png');
      background-size: auto 100%; 
      background-repeat: repeat-x;
      background-position: bottom; 
      image-rendering: pixelated;
      z-index: 5;
      position: relative;
    }

    .main-content-area {
      width: 100vw;
      background-image: url('bottom-ground.png');
      background-repeat: repeat;
      background-size: auto; 
      image-rendering: pixelated;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 0;
      flex-grow: 1;
      margin-top: -2px;
    }

    .section-title {
      width: 90%; max-width: 800px; color: white; text-align: right;
      border-right: 10px solid #ffbf00; padding-right: 25px; margin-bottom: 40px;
      font-size: 2.2em; text-shadow: 3px 3px 0px #000;
    }

    .portfolio-container { width: 100%; overflow: hidden; padding: 0; } /* إزالة الـ padding */
    .portfolio-scroll-track {
      display: flex; 
      gap: 0; /* تم التعديل ليلتصقوا ببعض */
      width: max-content;
      animation: scroll-infinite 30s linear infinite;
    }

    .portfolio-item { 
      width: 320px; 
      height: 320px; 
      flex-shrink: 0; 
      cursor: zoom-in;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .portfolio-item:hover { transform: scale(1.1); z-index: 10; } /* إضافة z-index ليظهر فوق الجيران عند التكبير */
    .portfolio-item img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

    .lightbox {
      display: none; position: fixed; z-index: 1000;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center;
    }
    .lightbox-container { position: relative; width: 90%; max-width: 1000px; background: #1a1a1a; border-radius: 15px; overflow: hidden; display: flex; flex-direction: row-reverse; }
    .lightbox-img-side { flex: 1.5; background: #000; height: 600px; display: flex; justify-content: center; align-items: center; }
    .lightbox-img-side img { max-width: 100%; max-height: 100%; image-rendering: pixelated; }
    .lightbox-info-side { flex: 1; padding: 40px; color: white; }
    .close-lightbox { position: absolute; top: 20px; left: 20px; color: white; font-size: 30px; cursor: pointer; }

    #copy-modal {
      visibility: hidden; opacity: 0; position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%); background: #ffbf00; color: #000; padding: 12px 30px; font-weight: bold; border-radius: 8px; z-index: 2000; transition: 0.3s;
    }
    #copy-modal.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(-10px); }
  </style>
</head>
<body>

  <div class="header-section">
    <h1>ليموني</h1>
    <div class="desc">
      <span style="font-size: 1.6em;">أهلا ! أنا ليموني :)</span><br>
      <span style="font-size: 1.3em; opacity: 0.9;">رسام Pixel Art</span>
    </div>

    <div class="social-links">
      <div class="social-btn" id="discord">
        <svg viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.21h0A105.73,105.73,0,0,0,32.47,96.36,77.7,77.7,0,0,0,39.2,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.73,11.1,105.32,105.32,0,0,0,32.05-16.14h0C130.11,50.4,121.5,26.72,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.07,65.69,84.69,65.69Z" fill="white"/></svg>
        <span>Discord</span>
      </div>
      <a href="https://github.com/lemon-ex" target="_blank" class="social-btn" id="github">
        <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" fill="white"/></svg>
        <span>Github</span>
      </a>
      <a href="https://error404-x.itch.io" target="_blank" class="social-btn" id="itch">
        <img src="https://img.itch.zone/aW1nLzIzMjkzNjI0LnBuZw==/original/lWMo7d.png" alt="itch">
        <span>Itch.io</span>
      </a>
      <div class="social-btn" id="email">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="white"/></svg>
        <span>Email</span>
      </div>
    </div>
  </div>

  <div class="top-ground-divider"></div>

  <div class="main-content-area">
    <h2 class="section-title">أعمالي</h2>

    <div class="portfolio-container">
      <div class="portfolio-scroll-track">
        <div class="portfolio-item"><img src="assets/potato.png" data-title="بطاطا" data-description="رسمة بكسل لطيفة للبطاطا"></div>
        <div class="portfolio-item"><img src="assets/hollow-knight.png" data-title="Hollow Knight" data-description="فان آرت للبطل الصغير"></div>
        <div class="portfolio-item"><img src="assets/peashooter.png" data-title="Peashooter" data-description="مقاتل البازلاء من PvZ"></div>
        <div class="portfolio-item"><img src="assets/piranha-plant.gif" data-title="نبتة مفترسة" data-description="حركة بكسل احترافية"></div>
        <div class="portfolio-item"><img src="assets/plant-in-space.png" data-title="نبتة في الفضاء" data-description="مغامرة زراعية فضائية"></div>
        <div class="portfolio-item"><img src="assets/hakem.png" data-title="حاكم" data-description="شخصية بكسل"></div>
        <div class="portfolio-item"><img src="assets/lemone.png" data-title="ليموني" data-description="أنا :)"></div>
        
        <div class="portfolio-item"><img src="assets/potato.png" data-title="بطاطا" data-description="وصف"></div>
        <div class="portfolio-item"><img src="assets/hollow-knight.png" data-title="Hollow Knight" data-description="وصف"></div>
      </div>
    </div>
  </div>

  <div id="image-lightbox" class="lightbox">
    <div class="lightbox-container">
      <span class="close-lightbox">✕</span>
      <div class="lightbox-body">
        <div class="lightbox-img-side"><img id="full-img"></div>
        <div class="lightbox-info-side"><h3 id="img-title"></h3><p id="img-description"></p></div>
      </div>
    </div>
  </div>

  <div id="copy-modal">تم النسخ !</div>

  <script>
    document.querySelectorAll('#discord, #email').forEach(btn => {
      btn.addEventListener('click', () => {
        const text = btn.id === 'discord' ? 'lemone_0x' : 'your-email@example.com';
        navigator.clipboard.writeText(text).then(() => {
          const modal = document.getElementById('copy-modal');
          modal.classList.add('show');
          setTimeout(() => modal.classList.remove('show'), 2000);
        });
      });
    });

    const lightbox = document.getElementById('image-lightbox');
    const fullImg = document.getElementById('full-img');
    const titleText = document.getElementById('img-title');
    const descText = document.getElementById('img-description');

    document.querySelectorAll('.portfolio-item img').forEach(img => {
      img.addEventListener('click', () => {
        fullImg.src = img.src;
        titleText.textContent = img.dataset.title;
        descText.textContent = img.dataset.description;
        lightbox.style.display = 'flex';
      });
    });

    lightbox.addEventListener('click', e => {
      if(e.target === lightbox || e.target.className === 'close-lightbox') {
        lightbox.style.display = 'none';
      }
    });
  </script>
</body>
</html>
