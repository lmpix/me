  <div id="image-lightbox" class="lightbox">
    <div class="lightbox-container" id="modal-container">
      <span class="close-lightbox">✕</span>
      <div class="lightbox-body">
        <div class="lightbox-img-side">
          <img id="full-img">
        </div>
        <div class="lightbox-info-side">
          <h3 id="img-title">العنوان</h3>
          <p id="img-description">الوصف هنا</p>
        </div>
      </div>
    </div>
  </div>

  <div id="copy-modal">تم النسخ ✅</div>

  <script>
    // منع القائمة اليمنى وسحب الصور فقط، مع السماح بالضغط
    document.addEventListener('contextmenu', function(e) {
      if (e.target.tagName === 'IMG') {
        e.preventDefault();
      }
    }, false);

    document.addEventListener('dragstart', function(e) {
      if (e.target.tagName === 'IMG') {
        e.preventDefault();
      }
    }, false);

    // نظام النسخ
    document.querySelectorAll('#discord, #email').forEach(btn => {
      btn.addEventListener('click', () => {
        const text = btn.id === 'discord' ? 'lemone_0x' : 'lemon@example.com';
        navigator.clipboard.writeText(text).then(() => {
          const modal = document.getElementById('copy-modal');
          modal.classList.add('show');
          setTimeout(() => modal.classList.remove('show'), 2000);
        });
      });
    });

    // نظام النافذة المنبثقة
    const lightbox = document.getElementById('image-lightbox');
    const container = document.getElementById('modal-container');
    const fullImg = document.getElementById('full-img');
    const titleText = document.getElementById('img-title');
    const descText = document.getElementById('img-description');
    const closeBtn = document.querySelector('.close-lightbox');

    document.querySelectorAll('.portfolio-item img').forEach(img => {
      img.addEventListener('click', () => {
        fullImg.src = img.src;
        titleText.textContent = img.getAttribute('data-title') || "بدون عنوان";
        descText.textContent = img.getAttribute('data-description') || "لا يوجد وصف.";
        lightbox.style.display = 'flex';
        container.classList.remove('closing');
      });
    });

    function closeLightbox() {
      container.classList.add('closing');
      setTimeout(() => {
        lightbox.style.display = 'none';
        container.classList.remove('closing');
      }, 300);
    }

    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => { 
      if(e.target === lightbox) closeLightbox(); 
    });
  </script>
